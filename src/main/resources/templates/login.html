<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-left-panel">
        <div class="logo-mini">F</div>
        <h1>Welcome Back</h1>
        <p>Choose your panel and continue.</p>
    </div>

    <div class="auth-card">
        <h2>Login</h2>
        <div class="login-actions">
            <a href="/user" class="primary-btn full-btn">Login as User</a>
            <a href="/admin" class="secondary-btn full-btn">Login as Admin</a>
        </div>
        <p class="switch-link">No account? <a href="/signup">Create one</a></p>
    </div>
</div>
</body>
</html>
